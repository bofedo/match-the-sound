<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#ff6b6b">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Match the Sound">
<link rel="manifest" href="manifest.json">
<title>Match the Sound — DoReMiFo</title>
<style>
:root{
  --bg:#fff8f0;--card:#fff;--border:#ffe0c0;
  --a1:#ff6b6b;--a2:#ff9f43;--a3:#ffd32a;--a4:#0be881;--a5:#48dbfb;--a6:#a29bfe;
  --ok:#0be881;--err:#ff6b6b;--txt:#2d2530;--txt2:#9b8fa0;--txt3:#c4b8c8;
  --r:20px;--r2:14px;--sh:0 4px 20px rgba(0,0,0,.08);--sh2:0 8px 32px rgba(0,0,0,.13);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--txt);
  min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(circle 200px at 10% 20%,rgba(255,107,107,.1),transparent),
             radial-gradient(circle 160px at 90% 15%,rgba(72,219,251,.12),transparent),
             radial-gradient(circle 180px at 80% 80%,rgba(162,155,254,.11),transparent),
             radial-gradient(circle 140px at 15% 85%,rgba(255,159,67,.1),transparent)}

/* MODE BAR */
#mode-bar{position:relative;z-index:10;width:100%;display:flex;justify-content:space-between;
  align-items:center;padding:8px 14px;background:rgba(255,255,255,.88);
  backdrop-filter:blur(12px);border-bottom:2px solid var(--border);gap:8px;flex-wrap:wrap}
.bar-left{display:flex;align-items:center;gap:8px}
.brand{font-size:11px;font-weight:700;color:var(--txt2);letter-spacing:.05em;text-transform:uppercase;white-space:nowrap}
.bar-right{display:flex;gap:6px;align-items:center}
.pill-group{display:flex;gap:4px}
.modeBtn,.langBtn{padding:4px 11px;border:2px solid var(--border);border-radius:20px;font-size:12px;
  font-weight:600;cursor:pointer;background:transparent;color:var(--txt2);transition:.2s;white-space:nowrap}
.modeBtn.active{background:var(--a1);border-color:var(--a1);color:#fff}
.langBtn.active{background:var(--a6);border-color:var(--a6);color:#fff}
.bar-sep{width:1px;height:20px;background:var(--border)}

/* SCREENS */
#screen-menu,#screen-game,#screen-result,#screen-email{
  position:relative;z-index:1;width:100%;max-width:460px;padding:20px 16px 48px;
  display:none;flex-direction:column;align-items:center;gap:18px}
.visible{display:flex!important}



/* TITLE */
.logo-row{display:flex;flex-direction:column;align-items:center;gap:4px;width:100%}
.logo-icon{font-size:52px;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.08)}}
h1{font-size:28px;font-weight:800;text-align:center}
h1 span{color:var(--a1)}
.tagline{font-size:14px;color:var(--txt2);text-align:center;font-weight:500}

/* DIFF */
.section-lbl{font-size:11px;font-weight:700;color:var(--txt3);letter-spacing:.08em;text-transform:uppercase;width:100%}
.diff-row{display:flex;gap:8px;width:100%}
.diff-btn{flex:1;padding:10px 4px;text-align:center;border:2px solid var(--border);
  border-radius:var(--r2);background:var(--card);color:var(--txt2);font-size:13px;font-weight:600;cursor:pointer;transition:.2s}
.diff-btn .di{display:block;font-size:22px;margin-bottom:2px}
.diff-btn.active{border-color:var(--a1);background:#fff5f5;color:var(--txt)}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%}
.stat-box{background:var(--card);border:2px solid var(--border);border-radius:var(--r2);padding:13px 8px;text-align:center;box-shadow:var(--sh)}
.stat-val{font-size:22px;font-weight:800;color:var(--a1)}
.stat-lbl{font-size:11px;color:var(--txt2);margin-top:2px;font-weight:500}

/* BUTTONS */
.big-btn{width:100%;padding:16px;font-size:17px;font-weight:800;border:none;
  border-radius:var(--r);cursor:pointer;transition:.18s;background:var(--a1);color:#fff;
  box-shadow:0 4px 0 #d45050,0 6px 20px rgba(255,107,107,.28)}
.big-btn:hover{transform:translateY(-2px);box-shadow:0 6px 0 #d45050,0 10px 28px rgba(255,107,107,.32)}
.big-btn:active{transform:translateY(2px);box-shadow:0 2px 0 #d45050}
.big-btn.ghost{background:var(--card);color:var(--txt2);border:2px solid var(--border);box-shadow:0 4px 0 var(--border)}
.big-btn.ghost:hover{border-color:var(--a1);color:var(--txt)}
.big-btn.teal{background:#0be881;box-shadow:0 4px 0 #08a85e,0 6px 20px rgba(11,232,129,.28)}
.big-btn.teal:hover{box-shadow:0 6px 0 #08a85e,0 10px 28px rgba(11,232,129,.3)}

/* HUD */
#hdr{width:100%;display:flex;justify-content:space-between;align-items:center}
#round-lbl{font-size:13px;font-weight:600;color:var(--txt2)}
#score-lbl{font-size:16px;font-weight:800;color:var(--a1)}
#prog-wrap{width:100%;height:10px;background:var(--border);border-radius:10px;overflow:hidden}
#prog-bar{height:10px;background:linear-gradient(90deg,var(--a1),var(--a2));border-radius:10px;transition:.4s}
#game-instr{font-size:14px;color:var(--txt2);text-align:center;font-weight:500}

/* SOUND BUTTONS */
.sound-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:100%}
.snd-btn{aspect-ratio:1;border:3px solid var(--border);border-radius:24px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;transition:.18s;background:var(--card);box-shadow:var(--sh);overflow:hidden}
.snd-btn:hover:not(:disabled){transform:translateY(-4px) scale(1.04);box-shadow:var(--sh2)}
.snd-btn:active:not(:disabled){transform:scale(.96)}
.snd-shape{width:52px;height:52px;transition:.3s;border-radius:60% 40% 70% 30%/50% 60% 40% 50%}
.snd-btn.playing .snd-shape{animation:morph 1s ease-in-out infinite}
@keyframes morph{
  0%,100%{border-radius:60% 40% 70% 30%/50% 60% 40% 50%;transform:scale(1)}
  33%{border-radius:30% 70% 40% 60%/60% 30% 70% 40%;transform:scale(1.14)}
  66%{border-radius:50% 50% 30% 70%/40% 60% 40% 60%;transform:scale(1.07)}}
.snd-btn.playing{border-color:var(--a2);box-shadow:0 0 0 4px rgba(255,159,67,.2),var(--sh2)}
.snd-btn.correct{border-color:var(--ok)!important;background:#f0fff8!important;box-shadow:0 0 0 4px rgba(11,232,129,.2)!important}
.snd-btn.correct .snd-shape{background:linear-gradient(135deg,#0be881,#05c46b)!important;border-radius:50%!important;animation:none!important}
.snd-btn.wrong{border-color:var(--err)!important;background:#fff5f5!important}
.snd-btn.wrong .snd-shape{background:linear-gradient(135deg,#ff6b6b,#ee5a24)!important;border-radius:50%!important;animation:none!important}
.snd-btn:disabled{cursor:not-allowed}
.snd-lbl{font-size:12px;font-weight:700;color:var(--txt2)}

/* HINT ROW */
.hint-row{display:flex;gap:10px;align-items:center;width:100%}
.play-all-btn{padding:10px 16px;background:var(--card);border:2px solid var(--border);
  border-radius:12px;color:var(--txt2);font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.play-all-btn:hover{border-color:var(--a1);color:var(--txt)}
.play-all-btn:disabled{opacity:.4;cursor:not-allowed}
#hint-txt{font-size:12px;color:var(--txt3);flex:1}

/* RESULT */
.result-hero{width:100%;background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:24px;text-align:center;box-shadow:var(--sh)}
.res-emoji{font-size:48px;animation:bounce 1.5s ease-in-out infinite}
.big-score{font-size:64px;font-weight:800;color:var(--a1);line-height:1.1}
.pts-lbl{font-size:14px;color:var(--txt2);font-weight:600}
.result-msg{font-size:20px;font-weight:800;margin-top:6px}
.acc-row{display:flex;justify-content:center;gap:6px;align-items:center;margin-top:10px;font-size:13px;color:var(--txt2);font-weight:600}
.acc-pill{padding:4px 14px;border-radius:20px;font-size:14px;font-weight:800;background:linear-gradient(90deg,var(--a1),var(--a2));color:#fff}

/* PROFILE */
#profile-wrap{width:100%;background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:20px;box-shadow:var(--sh)}
.profile-title{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:14px;text-align:center}
#profile-canvas{display:block;margin:0 auto}
.segment-badge{margin:14px auto 0;display:inline-flex;align-items:center;gap:8px;
  padding:8px 18px;border-radius:20px;font-size:14px;font-weight:700;color:#fff;
  box-shadow:0 3px 12px rgba(255,107,107,.3)}
.segment-desc{font-size:13px;color:var(--txt2);text-align:center;margin-top:8px;line-height:1.5}

/* BREAKDOWN */
.breakdown{width:100%;background:var(--card);border:2px solid var(--border);border-radius:var(--r);overflow:hidden;box-shadow:var(--sh)}
.br-row{display:flex;justify-content:space-between;align-items:center;padding:12px 18px;border-bottom:1.5px solid var(--border);font-size:14px}
.br-row:last-child{border-bottom:none}
.br-key{color:var(--txt2);font-weight:500}
.br-val{font-weight:700;color:var(--txt)}

/* EMAIL */
.email-hero{font-size:48px;text-align:center}
.email-card{width:100%;background:var(--card);border:2px solid var(--border);border-radius:var(--r);padding:24px;box-shadow:var(--sh);display:flex;flex-direction:column;gap:14px}
.email-card h2{font-size:20px;font-weight:800;text-align:center}
.email-card p{font-size:14px;color:var(--txt2);text-align:center;line-height:1.6}
.email-input{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:var(--r2);font-size:15px;background:var(--bg);color:var(--txt);outline:none;transition:.2s;font-family:inherit}
.email-input:focus{border-color:var(--a1)}
.perks{display:flex;flex-direction:column;gap:8px;width:100%}
.perk{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--txt2)}
.perk-icon{font-size:18px;flex-shrink:0}
.privacy-note{font-size:11px;color:var(--txt3);text-align:center;line-height:1.6}

/* CONFETTI */
.conf{position:fixed;pointer-events:none;z-index:500;animation:fall linear forwards}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}

/* TOAST */
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  background:var(--txt);color:#fff;padding:10px 22px;border-radius:24px;
  font-size:14px;font-weight:600;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999;white-space:nowrap}
#toast.show{opacity:1}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:200}
.spin{width:42px;height:42px;border-radius:50%;border:3px solid var(--border);border-top-color:var(--a1);animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.load-txt{font-size:14px;color:var(--txt2);font-weight:600}
</style>
</head>
<body>

<div id="loader"><div class="spin"></div><div class="load-txt" id="loader-txt">…</div></div>

<div id="mode-bar">
  <div class="pill-group">
    <button class="langBtn active" onclick="setLang('sk')">SK</button>
    <button class="langBtn"        onclick="setLang('cs')">CZ</button>
    <button class="langBtn"        onclick="setLang('en')">EN</button>
  </div>
</div>

<!-- MENU -->
<div id="screen-menu" class="visible">

  <div class="logo-row">
    <div class="logo-icon">🔊</div>
    <h1>Match the <span>Sound</span></h1>
    <p class="tagline" data-i18n="tagline"></p>
  </div>
  <div style="width:100%">
    <div class="section-lbl" style="margin-bottom:8px" data-i18n="diffLabel"></div>
    <div class="diff-row">
      <button class="diff-btn active" onclick="setDiff('easy',this)"><span class="di">🌱</span><span data-i18n="easy"></span></button>
      <button class="diff-btn"        onclick="setDiff('medium',this)"><span class="di">🎯</span><span data-i18n="medium"></span></button>
      <button class="diff-btn"        onclick="setDiff('hard',this)"><span class="di">🔥</span><span data-i18n="hard"></span></button>
    </div>
  </div>
  <div class="stats-grid">
    <div class="stat-box"><div class="stat-val" id="stat-total">0</div><div class="stat-lbl" data-i18n="statTotal"></div></div>
    <div class="stat-box"><div class="stat-val" id="stat-best">0%</div><div class="stat-lbl" data-i18n="statBest"></div></div>
    <div class="stat-box"><div class="stat-val" id="stat-streak">0</div><div class="stat-lbl" data-i18n="statStreak"></div></div>
  </div>
  <button class="big-btn" onclick="startGame()" data-i18n="btnStart"></button>
  <button class="big-btn ghost" onclick="showInfo()" data-i18n="btnHow"></button>
</div>

<!-- GAME -->
<div id="screen-game">
  <div id="hdr">
    <span id="round-lbl"></span>
    <span id="score-lbl">0</span>
  </div>
  <div id="prog-wrap"><div id="prog-bar" style="width:0%"></div></div>
  <p id="game-instr" data-i18n="gameInstr"></p>
  <div class="sound-grid">
    <button class="snd-btn" id="snd0" onclick="handlePick(0)"><div class="snd-shape"></div><span class="snd-lbl" data-i18n="sndA"></span></button>
    <button class="snd-btn" id="snd1" onclick="handlePick(1)"><div class="snd-shape"></div><span class="snd-lbl" data-i18n="sndB"></span></button>
    <button class="snd-btn" id="snd2" onclick="handlePick(2)"><div class="snd-shape"></div><span class="snd-lbl" data-i18n="sndC"></span></button>
  </div>
  <div class="hint-row">
    <button class="play-all-btn" id="play-all-btn" onclick="playAllSequence()">▶ <span data-i18n="btnPlayAll"></span></button>
    <span id="hint-txt" data-i18n="hintClick"></span>
  </div>
</div>

<!-- RESULT -->
<div id="screen-result">
  <div class="result-hero">
    <div class="res-emoji" id="res-emoji">🎉</div>
    <div class="big-score" id="res-score">0</div>
    <div class="pts-lbl" data-i18n="pts"></div>
    <div class="result-msg" id="res-msg"></div>
    <div class="acc-row"><span data-i18n="accuracy"></span>: <span class="acc-pill" id="acc-pill">0%</span></div>
  </div>
  <div id="profile-wrap">
    <div class="profile-title" data-i18n="profileTitle"></div>
    <canvas id="profile-canvas" width="260" height="220"></canvas>
    <div style="text-align:center"><span class="segment-badge" id="seg-badge">—</span></div>
    <p class="segment-desc" id="seg-desc"></p>
  </div>
  <div class="breakdown">
    <div class="br-row"><span class="br-key" data-i18n="correct"></span><span class="br-val" id="res-correct">0/10</span></div>
    <div class="br-row"><span class="br-key" data-i18n="avgRt"></span><span class="br-val" id="res-rt">—</span></div>
    <div class="br-row"><span class="br-key" data-i18n="diffLabel"></span><span class="br-val" id="res-diff">—</span></div>
    <div class="br-row" id="res-cell-row" style="display:none"><span class="br-key" data-i18n="lastCell"></span><span class="br-val" id="res-cell">—</span></div>
  </div>
  <button class="big-btn teal" onclick="goEmail()" data-i18n="btnProfile"></button>
  <button class="big-btn" onclick="startGame()" data-i18n="btnAgain"></button>
  <button class="big-btn ghost" onclick="showScreen('menu')" data-i18n="btnMenu"></button>
</div>

<!-- EMAIL -->
<div id="screen-email">
  <div class="email-hero" id="email-hero">🎧</div>
  <div class="email-card">
    <h2 id="email-h2"></h2>
    <p id="email-p"></p>
    <div class="perks" id="email-perks"></div>
    <input class="email-input" type="email" id="email-input">
    <button class="big-btn teal" id="email-submit-btn" onclick="submitEmail()" data-i18n="btnSubmit"></button>
    <button class="big-btn ghost" onclick="skipEmail()" data-i18n="btnSkip"></button>
  </div>
  <p class="privacy-note" data-i18n="privacy"></p>
</div>

<div id="toast"></div>

let lang='sk';
function t(key){return LANGS[lang][key]||key;}
function tSeg(seg,key){return LANGS[lang].seg[seg][key]||'';}

function setLang(l){
  lang=l;
  localStorage.setItem('mts_lang',l);
  document.documentElement.lang=l;
  document.querySelectorAll('.langBtn').forEach((b,i)=>b.classList.toggle('active',['sk','cs','en'][i]===l));
  applyI18n();
  // update dynamic labels
  refreshStats();
  if(state&&state.round>0)updateHUD();
}

function applyI18n(){
  document.querySelectorAll('[data-i18n]').forEach(el=>{
    const k=el.getAttribute('data-i18n');
    const v=t(k);if(v)el.textContent=v;
  });
  const loaderTxt=document.getElementById('loader-txt');
  if(loaderTxt)loaderTxt.textContent=t('loading');
  const scoreLbl=document.getElementById('score-lbl');
  if(scoreLbl)scoreLbl.textContent=state.score+' '+t('pts');
  const ei=document.getElementById('email-input');
  if(ei)ei.placeholder={sk:'tvoj@email.com',cs:'tvuj@email.cz',en:'your@email.com'}[lang];
}

// ── CONSTANTS ────────────────────────────────────────────────────────────────
const R2='https://pub-e597382e71d24ba2a9ec99f1249c6c55.r2.dev/';
const API='https://app.doremifo.com/game';
const CELLS=10,ROUNDS=10;
const DIFF_CFG={
  easy:  {same:[1,2,3],diff:[7,8,9],pts:10},
  medium:{same:[1,2,3,4],diff:[4,5,6,7],pts:15},
  hard:  {same:[1,2,3],diff:[2,3,4,5],pts:20}
};
const SHAPE_GRADS=[
  'linear-gradient(135deg,#ff6b6b,#ff9f43)',
  'linear-gradient(135deg,#48dbfb,#a29bfe)',
  'linear-gradient(135deg,#ffd32a,#0be881)',
  'linear-gradient(135deg,#ff9ff3,#f368e0)',
  'linear-gradient(135deg,#54a0ff,#5f27cd)',
  'linear-gradient(135deg,#ff9f43,#ee5a24)',
];
const SEG_COLORS={sharp:'#a29bfe',sensitive:'#48dbfb',casual:'#ff9f43'};

let difficulty = 'easy';
let uiMode = 'adult';
let state={round:0,score:0,correct:0,rounds:[],answered:false,
           roundResults:[],lastSoundEndTime:0,
           lastCell:0,lastSame:0,lastDiff:0,finalSegment:'',finalAcc:0,finalRt:0};
let audioCtx=null,buffers={},currentSrc=null;
const sessionId=(()=>{let s=sessionStorage.getItem('mts_sid');if(!s){s=crypto.randomUUID();sessionStorage.setItem('mts_sid',s);}return s;})();

// ── STORAGE ───────────────────────────────────────────────────────────────────
const getStats=()=>{try{return JSON.parse(localStorage.getItem('mts3_stats')||'{"total":0,"best":0,"streak":0}');}catch{return{total:0,best:0,streak:0};}};
const saveStats=s=>localStorage.setItem('mts3_stats',JSON.stringify(s));
function refreshStats(){const s=getStats();document.getElementById('stat-total').textContent=s.total;document.getElementById('stat-best').textContent=s.best+'%';document.getElementById('stat-streak').textContent=s.streak;}

// ── UI ────────────────────────────────────────────────────────────────────────
function showScreen(id){['menu','game','result','email'].forEach(n=>document.getElementById('screen-'+n).classList.remove('visible'));document.getElementById('screen-'+id).classList.add('visible');}
function toast(msg,dur=2200){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');setTimeout(()=>el.classList.remove('show'),dur);}
function showInfo(){toast(t('howToPlay'),4000);}
function setUIMode(m){
  uiMode=m;
  document.getElementById('btn-adult').classList.toggle('active',m==='adult');
  document.getElementById('btn-kid').classList.toggle('active',m==='kid');
  document.getElementById('res-cell-row').style.display=m==='adult'?'flex':'none';
}
function setDiff(d,btn){difficulty=d;document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));if(btn)btn.classList.add('active');}
function updateHUD(){
  document.getElementById('round-lbl').textContent=`${t('roundOf')} ${state.round+1} ${t('of')} ${ROUNDS}`;
  document.getElementById('score-lbl').textContent=`${state.score} ${t('pts')}`;
}



// ── CONFETTI ──────────────────────────────────────────────────────────────────
function confetti(){const em=['🎉','⭐','🌟','✨','🎊','💫','🎵','🎶'];for(let i=0;i<16;i++){const el=document.createElement('span');el.className='conf';el.textContent=em[Math.floor(Math.random()*em.length)];el.style.cssText=`left:${Math.random()*100}vw;top:-30px;font-size:${16+Math.random()*18}px;animation-duration:${1.4+Math.random()}s;animation-delay:${Math.random()*.5}s`;document.body.appendChild(el);setTimeout(()=>el.remove(),2600);}}

// ── AUDIO ─────────────────────────────────────────────────────────────────────
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function wavUrl(c,v){return`${R2}CELL${String(c).padStart(2,'0')}_VAR${String(v).padStart(2,'0')}.wav`;}
async function loadBuf(c,v){const k=`C${c}V${v}`;if(buffers[k])return buffers[k];try{const r=await fetch(wavUrl(c,v));const ab=await r.arrayBuffer();const buf=await getCtx().decodeAudioData(ab);buffers[k]=buf;return buf;}catch(e){console.warn('load fail',k,e);return null;}}
function stopCurrent(){if(currentSrc){try{currentSrc.stop();}catch(e){}currentSrc=null;}}
async function playSound(c,v,idx){
  stopCurrent();
  const ctx=getCtx();if(ctx.state==='suspended')await ctx.resume();
  const buf=await loadBuf(c,v);if(!buf){toast(t('toastLoadFail'));return;}
  const src=ctx.createBufferSource();src.buffer=buf;src.connect(ctx.destination);
  currentSrc=src;
  document.getElementById('snd'+idx).classList.add('playing');
  return new Promise(res=>{src.onended=()=>{document.getElementById('snd'+idx).classList.remove('playing');if(currentSrc===src){currentSrc=null;state.lastSoundEndTime=performance.now();}res();};src.start();});
}

// ── ROUND GEN ─────────────────────────────────────────────────────────────────
const rnd=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;
const pick=arr=>arr[Math.floor(Math.random()*arr.length)];
function genRound(){
  const cfg=DIFF_CFG[difficulty];
  const cell=rnd(1,CELLS);const sv=pick(cfg.same);let dv;do{dv=pick(cfg.diff);}while(dv===sv);
  const odd=rnd(0,2);
  return{cell,sameVar:sv,diffVar:dv,oddIdx:odd,
    sounds:[0,1,2].map(i=>({cell,varNum:i===odd?dv:sv})),
    shapeGrads:[0,1,2].map(()=>Math.floor(Math.random()*SHAPE_GRADS.length))};
}
async function preload(r){if(!r)return;for(const s of r.sounds)await loadBuf(s.cell,s.varNum);}

// ── GAME FLOW ─────────────────────────────────────────────────────────────────
async function startGame(){
  stopCurrent();
  state={round:0,score:0,correct:0,rounds:Array.from({length:ROUNDS},genRound),answered:false,
         roundResults:[],lastSoundEndTime:0,lastCell:0,lastSame:0,lastDiff:0,finalSegment:'',finalAcc:0,finalRt:0};
  showScreen('game');await renderRound();
}

async function renderRound(){
  const r=state.rounds[state.round];state.answered=false;
  updateHUD();
  document.getElementById('prog-bar').style.width=`${state.round/ROUNDS*100}%`;
  [0,1,2].forEach(i=>{
    const btn=document.getElementById('snd'+i);btn.className='snd-btn';btn.disabled=false;
    btn.querySelector('.snd-shape').style.background=SHAPE_GRADS[r.shapeGrads[i]];
    btn.querySelector('.snd-lbl').textContent=t(['sndA','sndB','sndC'][i]);
  });
  document.getElementById('hint-txt').textContent=t('hintClick');
  document.getElementById('play-all-btn').disabled=false;
  state.lastSoundEndTime=0;
  await preload(r);
  if(state.rounds[state.round+1])preload(state.rounds[state.round+1]);
  if(difficulty==='easy')setTimeout(()=>playAllSequence(),500);
}

async function playAllSequence(){
  const r=state.rounds[state.round];if(!r)return;
  const btn=document.getElementById('play-all-btn');btn.disabled=true;
  for(let i=0;i<3;i++){await playSound(r.sounds[i].cell,r.sounds[i].varNum,i);await new Promise(res=>setTimeout(res,500));}
  state.lastSoundEndTime=performance.now();
  btn.disabled=false;
}

function handlePick(idx){
  if(state.answered)return;state.answered=true;
  const now=performance.now();
  const rt=state.lastSoundEndTime>0?Math.round(now-state.lastSoundEndTime):0;
  const r=state.rounds[state.round];const ok=idx===r.oddIdx;
  document.getElementById('snd'+r.oddIdx).classList.add('correct');
  if(!ok)document.getElementById('snd'+idx).classList.add('wrong');
  [0,1,2].forEach(i=>document.getElementById('snd'+i).disabled=true);
  const pts=DIFF_CFG[difficulty].pts;
  if(ok){state.score+=pts;state.correct++;toast(uiMode==='kid'?t('toastCorrectKid'):t('toastCorrect')+' +'+pts);}
  else toast(uiMode==='kid'?t('toastWrongKid'):t('toastWrong'));
  if(uiMode==='adult')document.getElementById('hint-txt').textContent=
    `Cell ${String(r.cell).padStart(2,'0')} · VAR${String(r.sameVar).padStart(2,'0')} vs VAR${String(r.diffVar).padStart(2,'0')}`;
  state.roundResults.push({cell:r.cell,same_var:r.sameVar,diff_var:r.diffVar,odd_idx:r.oddIdx,chosen_idx:idx,correct:ok,rt_ms:rt});
  state.lastCell=r.cell;state.lastSame=r.sameVar;state.lastDiff=r.diffVar;
  setTimeout(()=>{state.round++;state.round>=ROUNDS?endGame():renderRound();},1500);
}

// ── SEGMENT + RADAR ───────────────────────────────────────────────────────────
function calcSegment(acc,avgRt){return acc>=0.8&&(avgRt<2000||avgRt===0)?'sharp':acc>=0.5?'sensitive':'casual';}
function calcConsistency(){const rr=state.roundResults;if(!rr.length)return.5;return rr.filter(r=>r.correct).length/rr.length;}

function drawRadar(acc,avgRt,diff){
  const cv=document.getElementById('profile-canvas');
  const ctx=cv.getContext('2d');
  const cx=130,cy=115,r=80;
  ctx.clearRect(0,0,260,220);
  const axes=[
    {val:acc},
    {val:avgRt===0?.5:Math.max(0,Math.min(1,1-(avgRt-300)/3000))},
    {val:calcConsistency()},
    {val:{easy:.33,medium:.67,hard:1}[diff]},
    {val:Math.min(1,state.roundResults.length/ROUNDS)},
  ];
  const labels=[t('radarAccuracy'),t('radarSpeed'),t('radarConsistency'),t('radarDiff'),t('radarEngagement')];
  const N=5;const step=2*Math.PI/N;
  [.25,.5,.75,1].forEach(ring=>{
    ctx.beginPath();
    for(let i=0;i<N;i++){const a=i*step-Math.PI/2;ctx.lineTo(cx+ring*r*Math.cos(a),cy+ring*r*Math.sin(a));}
    ctx.closePath();ctx.strokeStyle=ring===1?'rgba(0,0,0,.12)':'rgba(0,0,0,.06)';ctx.lineWidth=1;ctx.stroke();
  });
  for(let i=0;i<N;i++){const a=i*step-Math.PI/2;ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));ctx.strokeStyle='rgba(0,0,0,.08)';ctx.lineWidth=1;ctx.stroke();}
  const seg=calcSegment(acc,avgRt||9999);
  const col=SEG_COLORS[seg];
  ctx.beginPath();
  axes.forEach((ax,i)=>{const a=i*step-Math.PI/2;const rv=ax.val*r;i===0?ctx.moveTo(cx+rv*Math.cos(a),cy+rv*Math.sin(a)):ctx.lineTo(cx+rv*Math.cos(a),cy+rv*Math.sin(a));});
  ctx.closePath();
  ctx.fillStyle=col+'55';ctx.fill();ctx.strokeStyle=col;ctx.lineWidth=2.5;ctx.stroke();
  axes.forEach((ax,i)=>{
    const a=i*step-Math.PI/2;const rv=ax.val*r;
    const px=cx+rv*Math.cos(a),py=cy+rv*Math.sin(a);
    ctx.beginPath();ctx.arc(px,py,4,0,2*Math.PI);ctx.fillStyle=col;ctx.fill();
    const lx=cx+(r+22)*Math.cos(a),ly=cy+(r+22)*Math.sin(a);
    ctx.font='bold 11px system-ui,sans-serif';ctx.fillStyle='rgba(45,37,48,.65)';
    ctx.textAlign=lx>cx+4?'left':lx<cx-4?'right':'center';
    ctx.textBaseline=ly>cy+4?'top':ly<cy-4?'bottom':'middle';
    ctx.fillText(labels[i],lx,ly);
  });
}

// ── END GAME ──────────────────────────────────────────────────────────────────
function endGame(){
  document.getElementById('prog-bar').style.width='100%';
  const acc=state.correct/ROUNDS;
  const rts=state.roundResults.filter(r=>r.rt_ms>0).map(r=>r.rt_ms);
  const avgRt=rts.length?Math.round(rts.reduce((a,b)=>a+b,0)/rts.length):0;
  const seg=calcSegment(acc,avgRt);
  const accPct=Math.round(acc*100);
  state.finalSegment=seg;state.finalAcc=acc;state.finalRt=avgRt;
  const s=getStats();s.total++;if(accPct>s.best)s.best=accPct;s.streak=state.correct===ROUNDS?s.streak+1:0;saveStats(s);refreshStats();
  document.getElementById('res-score').textContent=state.score;
  document.getElementById('res-correct').textContent=`${state.correct} / ${ROUNDS}`;
  document.getElementById('res-rt').textContent=avgRt?`${avgRt} ms`:'—';
  document.getElementById('res-diff').textContent={easy:t('easy'),medium:t('medium'),hard:t('hard')}[difficulty];
  document.getElementById('res-cell').textContent=`Cell ${String(state.lastCell).padStart(2,'0')} · VAR${String(state.lastSame).padStart(2,'0')} vs VAR${String(state.lastDiff).padStart(2,'0')}`;
  document.getElementById('res-emoji').textContent=accPct>=90?'🏆':accPct>=70?'🎉':accPct>=50?'🎵':'🎶';
  document.getElementById('res-msg').textContent=accPct>=90?t('msgPerfect'):accPct>=70?t('msgGreat'):accPct>=50?t('msgGood'):t('msgKeep');
  document.getElementById('acc-pill').textContent=accPct+'%';
  const cfg=LANGS[lang].seg[seg];
  document.getElementById('seg-badge').textContent=cfg.emoji+' '+cfg.label;
  document.getElementById('seg-badge').style.background=`linear-gradient(90deg,${SEG_COLORS[seg]},${SEG_COLORS[seg]}aa)`;
  document.getElementById('seg-desc').textContent=cfg.desc;
  drawRadar(acc,avgRt,difficulty);
  if(accPct>=70)confetti();
  showScreen('result');
  sendResult(null);
}

// ── EMAIL ─────────────────────────────────────────────────────────────────────
function goEmail(){
  const cfg=LANGS[lang].seg[state.finalSegment];
  document.getElementById('email-hero').textContent=cfg.emoji;
  document.getElementById('email-h2').textContent=cfg.h2;
  document.getElementById('email-p').textContent=cfg.desc;
  document.getElementById('email-perks').innerHTML=cfg.perks.map(p=>`<div class="perk"><span class="perk-icon">${p.split(' ')[0]}</span><span>${p.slice(p.indexOf(' ')+1)}</span></div>`).join('');
  document.getElementById('email-input').value='';
  document.getElementById('email-submit-btn').textContent=t('btnSubmit');
  document.getElementById('email-submit-btn').disabled=false;
  showScreen('email');
}

async function submitEmail(){
  const val=document.getElementById('email-input').value.trim();
  if(!val||!/^[^@]+@[^@]+\.[^@]+$/.test(val)){toast(t('toastInvalidEmail'));return;}
  const btn=document.getElementById('email-submit-btn');
  btn.textContent=t('sending');btn.disabled=true;
  await sendResult(val);
  btn.textContent=t('sent');
  confetti();
  setTimeout(()=>showScreen('menu'),2200);
  toast(t('toastSent'),3000);
}

function skipEmail(){showScreen('menu');}

async function sendResult(email){
  try{
    await fetch(`${API}/result`,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({session_id:sessionId,email:email||null,difficulty,ui_mode:uiMode,
        score:state.score,correct:state.correct,total:ROUNDS,accuracy:state.finalAcc,
        avg_rt_ms:state.finalRt,segment:state.finalSegment,rounds:state.roundResults,
        user_agent:navigator.userAgent,referrer:document.referrer||null,lang})});
  }catch(e){console.warn('API fail',e);}
}

// ── INIT ──────────────────────────────────────────────────────────────────────
function init(){
  lang=localStorage.getItem('mts_lang')||navigator.language.slice(0,2)||'sk';
  if(!['sk','cs','en'].includes(lang))lang='en';
  document.querySelectorAll('.langBtn').forEach((b,i)=>b.classList.toggle('active',['sk','cs','en'][i]===lang));
  applyI18n();
  refreshStats();
  document.getElementById('loader').style.display='none';
  showScreen('menu');
}
if(document.readyState==='complete'){init();}else{window.addEventListener('load',init);}
document.addEventListener('touchstart',()=>{if(audioCtx?.state==='suspended')audioCtx.resume();},{once:true});
</script>
